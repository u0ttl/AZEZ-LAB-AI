name: Extract AZEZ LAB AI source

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/extract-project.yml'

permissions:
  contents: write

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract project archive
        shell: bash
        run: |
          set -euo pipefail
          ARCHIVE="AZEZ-LAB-AI-FINAL-V17-VERIFIED-FIXED.zip"
          test -f "$ARCHIVE"
          rm -rf .extract-temp
          mkdir -p .extract-temp
          unzip -q "$ARCHIVE" -d .extract-temp

          PROJECT_DIR="$(find .extract-temp -mindepth 1 -maxdepth 1 -type d | head -n 1)"
          if [ -z "$PROJECT_DIR" ]; then
            echo "Project directory was not found inside archive"
            exit 1
          fi

          rsync -a --delete \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='node_modules/' \
            --exclude='.env' \
            "$PROJECT_DIR"/ ./

          rm -rf .extract-temp
          rm -f "$ARCHIVE"

          cat > .gitignore <<'EOF'
          node_modules/
          dist/
          .vercel/
          .env
          .env.local
          .env.*.local
          *.log
          storage/objects/*
          !storage/objects/.gitkeep
          EOF

      - name: Commit extracted source
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Extract AZEZ LAB AI source for deployment"
          git push origin HEAD:main

